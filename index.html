<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas Learn v0.5 — How Many More?</title>
<style>
:root{--bg:#FAF8F3;--ink:#1D1D1F;--muted:#666872;--card:#FFFFFF;--line:#DDD7CC;--soft:#F1EEE7;--blue:#315C7C;--blue2:#DCEAF2;--green:#5C8A6A;--green2:#E4F0E7;--gold:#C9873A;--gold2:#F6E7D1;--shadow:0 24px 70px rgba(29,29,31,.10)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
body{background:radial-gradient(circle at top left,rgba(220,234,242,.95),transparent 34rem),radial-gradient(circle at bottom right,rgba(246,231,209,.8),transparent 28rem),var(--bg)}
button{font:inherit}.app{width:min(960px,100%);min-height:100vh;margin:0 auto;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:14px}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{font-weight:950;font-size:21px;letter-spacing:-.05em}
.progress{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;font-weight:850}.dots{display:flex;gap:5px}.dot{width:8px;height:8px;border-radius:999px;background:var(--line)}.dot.on{background:var(--blue)}
.panel{align-self:center;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);padding:clamp(22px,5vw,48px);min-height:76vh;display:grid;gap:18px}
.panel.lesson{grid-template-rows:auto auto minmax(270px,1fr) auto auto auto}.hero{align-content:center}
.kicker{display:inline-flex;width:max-content;border-radius:999px;padding:8px 13px;background:var(--blue2);color:var(--blue);text-transform:uppercase;letter-spacing:.09em;font-weight:950;font-size:12px}
h1{margin:0;font-size:clamp(42px,9vw,82px);line-height:.92;letter-spacing:-.075em}.sub{margin:0;color:var(--muted);font-size:clamp(18px,3.5vw,26px);line-height:1.35;font-weight:750;max-width:650px}
.row{display:flex;gap:12px;flex-wrap:wrap}.btn{border:1px solid var(--line);border-radius:999px;min-height:54px;padding:0 22px;font-weight:950;font-size:18px;cursor:pointer}.btn.primary{background:var(--blue);border-color:var(--blue);color:white}.btn.secondary{background:white;color:var(--ink)}.btn:disabled{opacity:.45;cursor:not-allowed}
.meta{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.badge{display:inline-flex;width:max-content;border-radius:999px;padding:8px 13px;background:var(--blue2);color:var(--blue);text-transform:uppercase;letter-spacing:.09em;font-weight:950;font-size:12px}.micro{color:var(--muted);font-weight:850;font-size:15px}.prompt{font-size:clamp(36px,7vw,68px);line-height:.96;letter-spacing:-.07em}
.stage{border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(250,248,243,.68),rgba(241,238,231,.82));min-height:270px;padding:18px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.inner{width:100%;display:flex;flex-direction:column;align-items:center;gap:18px}.blockRow{display:flex;gap:5px;justify-content:center;max-width:100%;overflow:hidden}.block{width:clamp(15px,4.2vw,30px);height:clamp(15px,4.2vw,30px);border-radius:8px;background:var(--blue2);border:1px solid rgba(49,92,124,.18);opacity:0;transform:translateY(8px);animation:rise .28s ease forwards}.block.green{background:var(--green2);border-color:rgba(92,138,106,.25)}.block.extra.active{background:var(--gold2);border-color:rgba(201,135,58,.55);animation:rise .28s ease forwards,glow 1s ease-in-out infinite alternate}.msg{text-align:center;font-weight:950;font-size:clamp(18px,4vw,28px);min-height:32px}
.choices{display:grid;grid-template-columns:1fr;gap:10px}.choice{border:1px solid var(--line);border-radius:999px;background:#fff;min-height:56px;padding:14px 18px;font-size:18px;font-weight:950;color:var(--ink);cursor:pointer;text-align:center}.choice.good{background:var(--green2);border-color:rgba(92,138,106,.45)}.choice.retry{background:var(--soft)}
.feedback{display:none;border:1px solid var(--line);border-radius:18px;background:var(--soft);padding:14px 16px;font-weight:850;font-size:16px}.nav{display:flex;justify-content:space-between;gap:12px}.footer{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-weight:800;font-size:13px}
.phrases{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:min(100%,650px)}.phrase{background:white;border:1px solid var(--line);border-radius:16px;padding:12px}.phrase strong{display:block;font-size:17px}.phrase span{display:block;color:var(--muted);font-weight:850;font-size:13px;margin-top:3px}
.tags{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.tag{background:white;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-weight:950}.equation{font-size:clamp(48px,12vw,96px);font-weight:950;letter-spacing:-.06em;text-align:center}.smallEq{font-size:clamp(18px,4vw,30px);font-weight:900;color:var(--muted);text-align:center}.endBox{text-align:center;display:grid;gap:18px;align-content:center}.done{font-size:clamp(54px,13vw,110px)}
@keyframes rise{to{opacity:1;transform:translateY(0)}}@keyframes glow{to{box-shadow:0 0 0 8px rgba(201,135,58,.20);transform:scale(1.05)}}
@media(min-width:720px){.app{padding:24px}.panel{border-radius:34px}.choices.three{grid-template-columns:repeat(3,1fr)}.choices.four{grid-template-columns:repeat(2,1fr)}}@media(max-width:430px){.stage{min-height:250px}.block{width:14px;height:14px;border-radius:5px}.phrases{grid-template-columns:1fr}.footer{flex-direction:column}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand">Atlas</div><div class="progress"><div class="dots" id="dots"></div><span id="step">Ready</span></div></header>
<main class="panel hero" id="panel"><span class="kicker">Lesson 001</span><h1>How many more?</h1><p class="sub">Learn one idea: comparison means finding the gap between two amounts.</p><div class="row"><button class="btn primary" id="startBtn">Start lesson</button></div></main>
<footer class="footer"><span>Atlas Learn v0.5</span><span>GitHub Pages ready</span></footer>
</div>
<script>
var mode="intro",current=0,answered=false;
var screens=[
{badge:"Observe",step:"Step 1 of 4",micro:"Look first. No math yet.",prompt:"Which group has extra blocks?",type:"blocks",revealed:false,message:"These extra blocks are the gap.",choices:[["Top",true,"Yes. The top group has extra blocks."],["Bottom",false,"Let’s compare them together."],["Same amount",false,"Let’s compare them together."]]},
{badge:"Discover",step:"Step 2 of 4",micro:"The groups are lined up now.",prompt:"What do the glowing blocks show?",type:"blocks",revealed:true,message:"The difference is the part that does not match.",choices:[["The total",false,"Not total. Total means putting both groups together."],["The difference",true,"Yes. The glowing blocks show the difference."],["The smaller group",false,"Not the smaller group. Look at what is left unmatched."],["The average",false,"Not average. We are comparing two amounts."]]},
{badge:"Language",step:"Step 3 of 4",micro:"Different words can ask for the same relationship.",prompt:"Different words. Same gap.",type:"language",revealed:true,message:"When words point to a gap, compare first.",choices:[["They all ask for the gap",true,"Yes. Different words can point to the same relationship."],["They all mean add",false,"Not quite. These words compare two amounts instead of combining them."],["They all mean something different",false,"They sound different, but here they all point to the same gap."]]},
{badge:"Symbol",step:"Step 4 of 4",micro:"Now the equation can make sense.",prompt:"How can we measure the gap?",type:"equation",revealed:true,message:"Subtraction measures the gap you already found.",choices:[["15 - 9",true,"Yes. Subtract to measure the gap."],["15 + 9",false,"That combines the groups. Here we are comparing them."],["9 - 15",false,"That reverses the comparison. Start with the larger amount."]]}
];
function el(id){return document.getElementById(id)}
function drawDots(){var html="";for(var i=0;i<4;i++){html+='<span class="dot '+(mode!=="intro"&&i===current?"on":"")+'"></span>'}el("dots").innerHTML=html}
function row(count,green,reveal){var html='<div class="blockRow">';for(var i=0;i<count;i++){var cls="block";if(green)cls+=" green";if(!green&&reveal&&i>=9)cls+=" extra active";html+='<span class="'+cls+'" style="animation-delay:'+(i*18)+'ms"></span>'}return html+"</div>"}
function blocks(reveal,message){return '<div class="inner">'+row(15,false,reveal)+row(9,true,reveal)+'<div class="msg">'+message+'</div></div>'}
function language(message){var p=[["How many more?","Find the gap"],["Difference","Find the gap"],["Exceeds by","Find the gap"],["Compared with","Find the gap"]];var html='<div class="inner">'+row(15,false,true)+row(9,true,true)+'<div class="msg">'+message+'</div><div class="phrases">';for(var i=0;i<p.length;i++){html+='<div class="phrase"><strong>'+p[i][0]+'</strong><span>'+p[i][1]+'</span></div>'}return html+"</div></div>"}
function equation(message){return '<div class="inner"><div class="tags"><span class="tag">Top group: 15</span><span class="tag">Bottom group: 9</span></div>'+row(15,false,true)+row(9,true,true)+'<div class="equation">15 - 9 = 6</div><div class="smallEq">'+message+'</div></div>'}
function choices(s){var html="";for(var i=0;i<s.choices.length;i++){html+='<button class="choice" data-i="'+i+'">'+s.choices[i][0]+'</button>'}return '<section class="choices '+(s.choices.length===4?"four":"three")+'" id="choices">'+html+'</section>'}
function renderLesson(){mode="lesson";answered=false;var s=screens[current];drawDots();el("step").innerHTML=s.step;var visual=s.type==="blocks"?blocks(s.revealed,""):s.type==="language"?language(s.message):equation(s.message);el("panel").className="panel lesson";el("panel").innerHTML='<div class="meta"><span class="badge">'+s.badge+'</span><span class="micro">'+s.micro+'</span></div><h1 class="prompt">'+s.prompt+'</h1><section class="stage" id="stage">'+visual+'</section>'+choices(s)+'<section class="feedback" id="feedback"></section><nav class="nav"><button class="btn secondary" id="backBtn">Back</button><button class="btn primary" id="nextBtn" disabled>Next</button></nav>';var b=document.getElementsByClassName("choice");for(var j=0;j<b.length;j++){b[j].onclick=function(){choose(parseInt(this.getAttribute("data-i"),10),this)}}el("backBtn").disabled=current===0;el("backBtn").onclick=function(){if(current>0){current--;renderLesson()}};el("nextBtn").onclick=function(){if(current<screens.length-1){current++;renderLesson()}else{renderFinish()}}}
function choose(i,btn){if(answered)return;answered=true;var s=screens[current],good=s.choices[i][1],b=document.getElementsByClassName("choice");for(var x=0;x<b.length;x++){b[x].disabled=true}btn.className+=good?" good":" retry";el("feedback").style.display="block";el("feedback").innerHTML=s.choices[i][2];el("nextBtn").disabled=false;if(s.type==="blocks")el("stage").innerHTML=blocks(true,s.message);if(s.type==="language")el("stage").innerHTML=language(s.message);if(s.type==="equation")el("stage").innerHTML=equation(s.message)}
function renderFinish(){mode="finish";el("step").innerHTML="Complete";el("dots").innerHTML='<span class="dot on"></span><span class="dot on"></span><span class="dot on"></span><span class="dot on"></span>';el("panel").className="panel hero";el("panel").innerHTML='<div class="endBox"><div class="done">✓</div><span class="kicker">Complete</span><h1>You measured the gap.</h1><p class="sub">Comparison means looking at two amounts and finding what does not match.</p><div class="row" style="justify-content:center"><button class="btn primary" id="restartBtn">Restart lesson</button></div></div>';el("restartBtn").onclick=function(){current=0;renderLesson()}}
el("startBtn").onclick=function(){current=0;renderLesson()};drawDots();
</script>
</body>
</html>
