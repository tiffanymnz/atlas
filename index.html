<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Atlas Lesson 001 v1.4</title><style>
:root{--bg:#FAF8F3;--surface:#fff;--soft:#F1EEE7;--text:#1D1D1F;--muted:#666872;--border:#DDD7CC;--primary:#315C7C;--primarySoft:#DCEAF2;--success:#5C8A6A;--successSoft:#E4F0E7;--warn:#C9873A;--warnSoft:#F6E7D1;--shadow:0 24px 70px rgba(29,29,31,.1);--scale:1}
[data-theme=dark]{--bg:#121416;--surface:#1B1F23;--soft:#242A30;--text:#F5F3EE;--muted:#B7B8BE;--border:#333A42}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(220,234,242,.75),transparent 34rem),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:calc(16px*var(--scale))}button{font:inherit}.app{width:min(1120px,100%);min-height:100vh;margin:auto;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}.header,.footer{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.brand{font-size:1.25rem;font-weight:950;letter-spacing:-.05em}.row{display:flex;gap:10px;flex-wrap:wrap}.panel{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:32px;box-shadow:var(--shadow);padding:clamp(20px,5vw,52px);display:grid;gap:18px;align-self:center}[data-theme=dark] .panel{background:rgba(27,31,35,.93)}.badge{width:max-content;border-radius:999px;padding:7px 12px;background:var(--primarySoft);color:var(--primary);font-weight:950;text-transform:uppercase;font-size:.75rem;letter-spacing:.08em}h1{font-size:clamp(2.4rem,7vw,5.5rem);line-height:.92;letter-spacing:-.075em;margin:0}p{line-height:1.55;color:var(--muted);font-weight:650;margin:0}.btn{border:1px solid var(--border);border-radius:999px;min-height:50px;padding:0 20px;background:var(--surface);color:var(--text);font-weight:900;cursor:pointer}.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn.secondary{background:var(--primarySoft);border-color:transparent;color:var(--primary)}.btn:disabled{opacity:.45;cursor:not-allowed}.progress{height:12px;background:var(--soft);border:1px solid var(--border);border-radius:999px;overflow:hidden}.progress span{display:block;height:100%;background:var(--primary);border-radius:999px}.stage{border:1px solid var(--border);border-radius:28px;background:linear-gradient(180deg,rgba(250,248,243,.72),rgba(241,238,231,.86));min-height:320px;padding:22px;display:grid;align-content:center;gap:20px;overflow:hidden}.blockLabel{text-align:center;color:var(--muted);font-weight:900}.blockRow{display:flex;gap:8px;justify-content:center;overflow:hidden}.block{width:clamp(22px,5vw,46px);height:clamp(22px,5vw,46px);border-radius:11px;background:var(--primarySoft);border:1px solid rgba(49,92,124,.18);opacity:0;transform:translateY(8px);animation:rise .28s ease forwards}.bottom{background:#E4F0E7}.extra{background:var(--warnSoft);border-color:rgba(201,135,58,.55);animation:rise .28s ease forwards,glow 1s ease-in-out infinite alternate}.dim{opacity:.45!important}.visualMsg{text-align:center;font-size:clamp(1.15rem,4vw,1.9rem);font-weight:950}.choiceGrid{display:grid;gap:12px}.choice{border:1px solid var(--border);background:var(--surface);border-radius:20px;min-height:64px;padding:16px 18px;text-align:left;font-weight:900;color:var(--text);cursor:pointer;display:flex;justify-content:space-between}.choice.selected{background:var(--primarySoft);border-color:var(--primary)}.choice.correct{background:var(--successSoft);border-color:rgba(92,138,106,.45)}.choice.incorrect{background:var(--soft);opacity:.8}.feedback,.hint,.coach{display:none;border:1px solid var(--border);border-radius:20px;padding:16px;background:var(--soft);font-weight:800}.feedback.success{background:var(--successSoft)}.feedback.warn,.hint{background:var(--warnSoft)}.coach{background:var(--primarySoft);color:var(--primary)}.equation{text-align:center;font-size:clamp(3rem,12vw,6.6rem);font-weight:950;letter-spacing:-.06em}.phraseGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.phrase{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px;font-weight:950}.phrase span{display:block;color:var(--muted);font-size:.9rem;margin-top:4px}.complete{text-align:center;display:grid;gap:18px}.check{font-size:clamp(4rem,13vw,8rem);color:var(--success);line-height:.8}
@keyframes rise{to{opacity:1;transform:translateY(0)}}@keyframes glow{to{box-shadow:0 0 0 8px rgba(201,135,58,.2);transform:scale(1.04)}}@media(max-width:720px){.app{padding:14px}.panel{padding:18px}.stage{min-height:280px}.block{width:20px;height:20px;border-radius:7px}.blockRow{gap:5px}}body.reduce *{animation:none!important;transition:none!important;opacity:1!important;transform:none!important}
</style></head><body><div class="app"><header class="header"><div class="brand">✦ Atlas</div><div class="row"><button class="btn secondary" id="themeBtn">Dark mode</button><button class="btn secondary" id="textBtn">Bigger text</button><button class="btn secondary" id="motionBtn">Reduce motion</button></div></header><main class="panel" id="appPanel"></main><footer class="footer"><span>MATH-NS-COMP-0001 · Lesson 001 v1.4</span><button class="btn secondary" id="analyticsBtn">Analytics</button></footer></div>
<script>
var screens=[{type:"intro",label:"Lesson 001",title:"How many more?",body:"One idea: comparison means finding the gap between two amounts."},{type:"observe",label:"Observe",title:"Which group has extra blocks?",msg:"Look first. No math yet."},{type:"discover",label:"Discover",title:"What do the glowing blocks show?",msg:"These extra blocks are the gap.",choices:[["The total",false,"Total means putting both groups together. This visual is comparing."],["The difference",true,"Correct. The glowing blocks show the difference, or the gap."],["The smaller group",false,"The smaller group is the green row. The glowing blocks are what is unmatched."]],hints:["Do not combine the groups.","Look for the blocks that do not have a match.","The unmatched blocks are the gap."]},{type:"language",label:"Language",title:"Different words. Same gap.",msg:"These phrases all point to the same relationship.",phrases:["How many more?","Difference","Exceeds by","Compared with"]},{type:"equationPredict",label:"Symbol",title:"What equation measures the gap?",choices:[["15 - 9",true,"Yes. Start with the larger amount and subtract the smaller amount."],["15 + 9",false,"That combines the groups. Here we are comparing them."],["9 - 15",false,"That reverses the comparison. Start with the larger amount."]],hints:["The equation should measure what is extra.","Start with 15 because it is the larger group."]},{type:"equationReveal",label:"Reveal",title:"Subtraction measures the gap.",equation:"15 - 9 = 6",msg:"The equation confirms what the visual already showed."},{type:"reflection",label:"Reflect",title:"What did you discover?",choices:[["Subtraction always means taking away.",false],["Subtraction can measure the gap between two amounts.",true],["The word more always means add.",false]]},{type:"complete",label:"Complete",title:"You measured the gap.",body:"You connected the visual, the words, and the equation. That is understanding."}];
var index=0,selected=null,hintIndex=0,events=[],dark=false,big=false,reduce=false;
function el(id){return document.getElementById(id)}
function emit(t,p){events.push({time:new Date().toISOString(),screen:index,component:screens[index].type,type:t,payload:p||{}})}
function pct(){return Math.round(index/(screens.length-1)*100)}
function base(s){return '<span class="badge">'+s.label+'</span><div class="progress"><span style="width:'+pct()+'%"></span></div><h1>'+s.title+'</h1>'}
function row(count,bottom,reveal){var h='<div class="blockRow">';for(var i=0;i<count;i++){var cls='block';if(bottom)cls+=' bottom';if(!bottom&&reveal&&i>=9)cls+=' extra';else if(reveal&&i<9)cls+=' dim';h+='<span class="'+cls+'" style="animation-delay:'+(i*20)+'ms"></span>'}return h+'</div>'}
function blocks(msg,reveal,labels){return '<div class="stage">'+(labels?'<div class="blockLabel">Top group: 15</div>':'')+row(15,false,reveal)+(labels?'<div class="blockLabel">Bottom group: 9</div>':'')+row(9,true,reveal)+'<div class="visualMsg">'+msg+'</div></div>'}
function render(){var s=screens[index];selected=null;hintIndex=0;emit("mount",{});if(s.type==="intro"){el("appPanel").innerHTML=base(s)+'<p>'+s.body+'</p><div class="coach" style="display:block">Atlas teaches meaning before procedure.</div><div class="row"><button class="btn primary" onclick="next()">Start lesson</button></div>';return}if(s.type==="observe"){el("appPanel").innerHTML=base(s)+blocks(s.msg,false,false)+'<div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Reveal the gap</button></div>';return}if(s.type==="discover"){choiceScreen(s,blocks(s.msg,true,false));return}if(s.type==="language"){var ph='';for(var i=0;i<s.phrases.length;i++)ph+='<div class="phrase">'+s.phrases[i]+'<span>Find the gap</span></div>';el("appPanel").innerHTML=base(s)+blocks(s.msg,true,false)+'<div class="phraseGrid">'+ph+'</div><div class="coach" style="display:block">AI Coach: Do not choose the operation from one word. First ask what relationship the sentence describes.</div><div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Next</button></div>';return}if(s.type==="equationPredict"){choiceScreen(s,blocks("The gap is visible. Now choose the equation.",true,true));return}if(s.type==="equationReveal"){el("appPanel").innerHTML=base(s)+blocks(s.msg,true,true)+'<div class="equation">'+s.equation+'</div><div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Reflect</button></div>';return}if(s.type==="reflection"){choiceScreen(s,'<p>Choose the statement that explains the idea.</p>');return}if(s.type==="complete"){el("appPanel").innerHTML='<div class="complete"><div class="check">✓</div>'+base(s)+'<p>'+s.body+'</p><div class="coach" style="display:block">Next concept: Difference.</div><button class="btn primary" onclick="restart()">Restart lesson</button></div>';return}}
function choiceScreen(s,visual){var html=base(s)+visual+'<div class="choiceGrid">';for(var i=0;i<s.choices.length;i++)html+='<button class="choice" data-i="'+i+'" onclick="pick(this)"><span>'+s.choices[i][0]+'</span><span></span></button>';html+='</div><div class="row"><button class="btn secondary" onclick="hint()">Hint</button><button class="btn primary" id="submit" onclick="submitChoice()" disabled>Check answer</button></div><div class="hint" id="hintBox"></div><div class="feedback" id="feedback"></div>';el("appPanel").innerHTML=html}
function pick(btn){selected=parseInt(btn.getAttribute("data-i"),10);var all=document.querySelectorAll(".choice");for(var i=0;i<all.length;i++)all[i].classList.remove("selected");btn.classList.add("selected");el("submit").disabled=false;emit("select",{value:selected})}
function enableRetry(msg){var all=document.querySelectorAll(".choice");for(var i=0;i<all.length;i++){all[i].disabled=false;all[i].classList.remove("selected","correct","incorrect");all[i].lastChild.innerHTML=""}selected=null;el("submit").disabled=true;var fb=el("feedback");fb.style.display="block";fb.className="feedback warn";fb.innerHTML="<strong>Try again.</strong><br>"+msg}
function submitChoice(){var s=screens[index],good=s.choices[selected][1],fb=el("feedback"),all=document.querySelectorAll(".choice");emit("submit",{correct:good,value:selected});if(good){for(var i=0;i<all.length;i++){all[i].disabled=true;if(s.choices[i][1])all[i].classList.add("correct")}fb.style.display="block";fb.className="feedback success";fb.innerHTML="<strong>Correct.</strong><br>"+s.choices[selected][2];setTimeout(next,900);return}var h=s.hints?s.hints[Math.min(hintIndex,s.hints.length-1)]:"Look for the relationship.";hintIndex++;fb.style.display="block";fb.className="feedback warn";fb.innerHTML="<strong>Look again.</strong><br>"+h;for(var j=0;j<all.length;j++){all[j].disabled=false;all[j].classList.remove("selected","correct","incorrect");all[j].lastChild.innerHTML=""}selected=null;el("submit").disabled=true;emit("guided_retry",{hint:h})}
function hint(){var s=screens[index],box=el("hintBox"),h=s.hints?s.hints[Math.min(hintIndex,s.hints.length-1)]:"Look for the relationship.";box.style.display="block";box.innerHTML="<strong>AI Hint</strong><br>"+h;emit("hint",{hintIndex:hintIndex,hint:h});hintIndex++}
function next(){if(index<screens.length-1){index++;render()}}
function back(){if(index>0){index--;render()}}
function restart(){index=0;events=[];render()}
el("analyticsBtn").onclick=function(){alert(JSON.stringify(events,null,2))};
el("themeBtn").onclick=function(){dark=!dark;document.body.setAttribute("data-theme",dark?"dark":"light");this.innerHTML=dark?"Light mode":"Dark mode"};
el("textBtn").onclick=function(){big=!big;document.documentElement.style.setProperty("--scale",big?"1.12":"1");this.innerHTML=big?"Normal text":"Bigger text"};
el("motionBtn").onclick=function(){reduce=!reduce;document.body.className=reduce?"reduce":"";this.innerHTML=reduce?"Allow motion":"Reduce motion"};
render();
</script></body></html>
