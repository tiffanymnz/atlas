<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas Lesson 001 Stable</title>
<style>
:root{
  --bg:#FAF8F3;
  --surface:#FFFFFF;
  --panel:#FFFFFF;
  --stage:#F4F0E8;
  --text:#1D1D1F;
  --muted:#666872;
  --border:#DCD5CA;
  --primary:#315C7C;
  --primary-soft:#CFE4F1;
  --green-soft:#D7EBDD;
  --gold-soft:#F1CF85;
  --success:#4F8460;
  --success-soft:#DDEFE3;
  --warn-soft:#F4E0B8;
  --shadow:0 24px 70px rgba(29,29,31,.10);
  --stage-shadow:0 16px 46px rgba(29,29,31,.08);
  --scale:1;
}
[data-theme="dark"]{
  --bg:#101315;
  --surface:#181D21;
  --panel:#1A1F24;
  --stage:#24282C;
  --text:#F5F3EE;
  --muted:#BBC0C6;
  --border:#343C44;
  --primary:#7FB4D8;
  --primary-soft:#BFDCEF;
  --green-soft:#C9E5D1;
  --gold-soft:#F0CC7E;
  --success:#9FD4AA;
  --success-soft:#254834;
  --warn-soft:#4A3B24;
  --shadow:0 24px 70px rgba(0,0,0,.32);
  --stage-shadow:0 18px 56px rgba(0,0,0,.30);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left,rgba(220,234,242,.70),transparent 34rem),
    radial-gradient(circle at bottom right,rgba(246,231,209,.55),transparent 30rem),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  font-size:calc(16px * var(--scale));
}
button{font:inherit}
.app{
  width:min(1120px,100%);
  min-height:100vh;
  margin:0 auto;
  padding:18px;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:18px;
}
.header,.footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.brand{
  font-size:1.25rem;
  font-weight:950;
  letter-spacing:-.05em;
}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.panel{
  background:rgba(255,255,255,.94);
  border:1px solid var(--border);
  border-radius:32px;
  box-shadow:var(--shadow);
  padding:clamp(20px,5vw,52px);
  display:grid;
  gap:18px;
  align-self:center;
}
[data-theme="dark"] .panel{background:rgba(26,31,36,.96)}
.badge{
  width:max-content;
  border-radius:999px;
  padding:7px 12px;
  background:var(--primary-soft);
  color:#244963;
  font-weight:950;
  text-transform:uppercase;
  font-size:.75rem;
  letter-spacing:.08em;
}
[data-theme="dark"] .badge{color:#173044}
h1{
  font-size:clamp(2.25rem,6.2vw,4.85rem);
  line-height:.94;
  letter-spacing:-.075em;
  margin:0;
}
p{
  line-height:1.55;
  color:var(--muted);
  font-weight:650;
  margin:0;
}
.btn{
  border:1px solid var(--border);
  border-radius:999px;
  min-height:50px;
  padding:0 20px;
  background:var(--surface);
  color:var(--text);
  font-weight:900;
  cursor:pointer;
}
.btn.primary{
  background:#315C7C;
  border-color:#315C7C;
  color:white;
}
[data-theme="dark"] .btn.primary{
  background:#376B91;
  border-color:#376B91;
}
.btn.secondary{
  background:var(--primary-soft);
  border-color:transparent;
  color:#244963;
}
.btn:disabled{opacity:.45;cursor:not-allowed}
.progress{
  height:12px;
  background:rgba(0,0,0,.04);
  border:1px solid var(--border);
  border-radius:999px;
  overflow:hidden;
}
[data-theme="dark"] .progress{background:#23292F}
.progress span{
  display:block;
  height:100%;
  width:0;
  background:#315C7C;
  border-radius:999px;
  transition:width .25s ease;
}
.stage{
  border:1px solid var(--border);
  border-radius:28px;
  background:var(--stage);
  box-shadow:var(--stage-shadow);
  min-height:340px;
  padding:26px;
  display:grid;
  align-content:center;
  gap:28px;
  overflow:hidden;
}
.blockLabel{
  width:min(100%,780px);
  margin:0 auto -12px;
  color:var(--muted);
  font-weight:900;
  font-size:.95rem;
}
.blockRow{
  width:min(100%,780px);
  margin:0 auto;
  display:flex;
  justify-content:flex-start;
  gap:8px;
  overflow:hidden;
}
.block{
  width:clamp(22px,5vw,46px);
  height:clamp(22px,5vw,46px);
  flex:0 0 auto;
  border-radius:11px;
  background:var(--primary-soft);
  border:1px solid rgba(49,92,124,.50);
  box-shadow:0 3px 8px rgba(29,29,31,.16), inset 0 1px 0 rgba(255,255,255,.55);
  opacity:0;
  transform:translateY(8px);
  animation:rise .28s ease forwards;
}
.block.bottom{
  background:var(--green-soft);
  border-color:rgba(92,138,106,.52);
}
.block.extra{
  background:var(--gold-soft);
  border-color:rgba(201,135,58,.75);
  animation:rise .28s ease forwards, glow 1s ease-in-out infinite alternate;
}
.block.dim{opacity:.42!important}
.visualMsg{
  text-align:center;
  font-size:clamp(1rem,3vw,1.45rem);
  font-weight:900;
  color:var(--text);
  opacity:.92;
  max-width:720px;
  margin:0 auto;
}
.choiceGrid{display:grid;gap:12px}
.choice{
  border:1px solid var(--border);
  background:var(--surface);
  border-radius:20px;
  min-height:64px;
  padding:16px 18px;
  text-align:left;
  font-weight:900;
  color:var(--text);
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  gap:14px;
}
.choice.selected{
  background:var(--primary-soft);
  border-color:#315C7C;
}
.choice.correct{
  background:var(--success-soft);
  border-color:rgba(79,132,96,.55);
}
.choice.incorrect{
  background:var(--warn-soft);
  border-color:rgba(201,135,58,.45);
}
.feedback,.hint,.coach{
  display:none;
  border:1px solid var(--border);
  border-radius:20px;
  padding:16px;
  font-weight:800;
}
.feedback.success{background:var(--success-soft)}
.feedback.warn,.hint{background:var(--warn-soft)}
.coach{
  background:var(--primary-soft);
  color:#244963;
}
.equation{
  text-align:center;
  font-size:clamp(3rem,12vw,6.6rem);
  font-weight:950;
  letter-spacing:-.06em;
}
.phraseGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:10px;
}
.phrase{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  font-weight:950;
}
.phrase span{
  display:block;
  color:var(--muted);
  font-size:.9rem;
  margin-top:4px;
}
.complete{
  text-align:center;
  display:grid;
  gap:18px;
}
.check{
  font-size:clamp(4rem,13vw,8rem);
  color:var(--success);
  line-height:.8;
}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
@keyframes glow{to{box-shadow:0 0 0 8px rgba(201,135,58,.22);transform:scale(1.04)}}
@media(max-width:720px){
  .app{padding:14px}
  .panel{padding:18px}
  .stage{min-height:285px;padding:18px;gap:22px}
  .block{width:20px;height:20px;border-radius:7px}
  .blockRow{gap:5px}
  h1{font-size:clamp(2.2rem,12vw,4rem)}
}
body.reduce *{
  animation:none!important;
  transition:none!important;
  transform:none!important;
  opacity:1!important;
}
</style>
</head>
<body>
<div class="app">
<header class="header">
  <div class="brand">✦ Atlas</div>
  <div class="row">
    <button class="btn secondary" id="themeBtn">Dark mode</button>
    <button class="btn secondary" id="textBtn">Bigger text</button>
    <button class="btn secondary" id="motionBtn">Reduce motion</button>
  </div>
</header>

<main class="panel" id="appPanel"></main>

<footer class="footer">
  <span>MATH-NS-COMP-0001 · Lesson 001 Stable</span>
  <button class="btn secondary" id="analyticsBtn">Analytics</button>
</footer>
</div>

<script>
const screens = [
  {
    type:"intro",
    label:"Lesson 001",
    title:"How many more?",
    body:"One idea: comparison means finding the gap between two amounts."
  },
  {
    type:"observe",
    label:"Observe",
    title:"Which group has extra blocks?",
    msg:"Look carefully. Which row goes farther?"
  },
  {
    type:"discover",
    label:"Discover",
    title:"What do the extra blocks show?",
    msg:"The extra blocks show the gap.",
    choices:[
      ["The total", false, "A total means putting both groups together. Here, we are comparing the rows."],
      ["The difference", true, "Correct. The extra blocks show the difference, or the gap."],
      ["The smaller group", false, "The smaller group is the green row. The extra blocks are what is left over."]
    ],
    hints:[
      "Look at the two rows side by side.",
      "Only count the blocks that do not have a match.",
      "The unmatched blocks show how far one row goes past the other."
    ]
  },
  {
    type:"language",
    label:"Language",
    title:"Different words. Same gap.",
    msg:"These phrases all ask you to compare.",
    phrases:["How many more?","Difference","Exceeds by","Compared with"]
  },
  {
    type:"equationPredict",
    label:"Symbol",
    title:"What equation measures the gap?",
    msg:"The top row goes farther. Which equation measures that gap?",
    choices:[
      ["15 - 9", true, "Yes. Start with the larger amount and subtract the smaller amount."],
      ["15 + 9", false, "That puts both groups together. This question asks for the gap."],
      ["9 - 15", false, "That starts with the smaller amount. Use the larger amount first."]
    ],
    hints:[
      "The equation should measure what is extra.",
      "Start with 15 because it is the longer row."
    ]
  },
  {
    type:"equationReveal",
    label:"Reveal",
    title:"Subtraction measures the gap.",
    msg:"The equation confirms what the visual already showed.",
    equation:"15 - 9 = 6"
  },
  {
    type:"reflection",
    label:"Reflect",
    title:"What did you discover?",
    choices:[
      ["Subtraction always means taking away.", false, "Not always. In this lesson, subtraction measured a gap."],
      ["Subtraction can measure the gap between two amounts.", true, "Correct. That is the main idea."],
      ["The word more always means add.", false, "Not always. Sometimes it asks you to compare."]
    ],
    hints:["Think about what the extra blocks showed."]
  },
  {
    type:"complete",
    label:"Complete",
    title:"You measured the gap.",
    body:"You connected the visual, the words, and the equation. That is understanding."
  }
];

let index = 0;
let selected = null;
let hintIndex = 0;
let events = [];
let dark = false;
let big = false;
let reduce = false;

function el(id){ return document.getElementById(id); }

function emit(type,payload){
  events.push({
    time:new Date().toISOString(),
    screen:index,
    component:screens[index].type,
    type:type,
    payload:payload || {}
  });
}

function pct(){
  return Math.round(index / (screens.length - 1) * 100);
}

function base(s){
  return '<span class="badge">'+s.label+'</span>' +
         '<div class="progress"><span style="width:'+pct()+'%"></span></div>' +
         '<h1>'+s.title+'</h1>';
}

function blockRow(count,isBottom,reveal){
  let html = '<div class="blockRow">';
  for(let i=0;i<count;i++){
    let cls = "block";
    if(isBottom) cls += " bottom";
    if(!isBottom && reveal && i >= 9) cls += " extra";
    else if(reveal && i < 9) cls += " dim";
    html += '<span class="'+cls+'" style="animation-delay:'+(i*18)+'ms"></span>';
  }
  html += '</div>';
  return html;
}

function blocks(message,reveal,labels){
  return '<div class="stage">' +
    (labels ? '<div class="blockLabel">Top row: 15</div>' : '') +
    blockRow(15,false,reveal) +
    (labels ? '<div class="blockLabel">Bottom row: 9</div>' : '') +
    blockRow(9,true,reveal) +
    '<div class="visualMsg">'+message+'</div>' +
  '</div>';
}

function render(){
  const s = screens[index];
  selected = null;
  hintIndex = 0;
  emit("mount",{});

  if(s.type === "intro"){
    el("appPanel").innerHTML =
      base(s) +
      '<p>'+s.body+'</p>' +
      '<div class="coach" style="display:block">Atlas teaches the idea before the shortcut.</div>' +
      '<div class="row"><button class="btn primary" onclick="next()">Start lesson</button></div>';
    return;
  }

  if(s.type === "observe"){
    el("appPanel").innerHTML =
      base(s) +
      blocks(s.msg,false,false) +
      '<div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Reveal the gap</button></div>';
    return;
  }

  if(s.type === "discover"){
    choiceScreen(s, blocks(s.msg,true,false));
    return;
  }

  if(s.type === "language"){
    let phrases = "";
    s.phrases.forEach(p => {
      phrases += '<div class="phrase">'+p+'<span>Find the gap</span></div>';
    });
    el("appPanel").innerHTML =
      base(s) +
      blocks(s.msg,true,false) +
      '<div class="phraseGrid">'+phrases+'</div>' +
      '<div class="coach" style="display:block">First ask: are we putting the groups together, or finding how far apart they are?</div>' +
      '<div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Next</button></div>';
    return;
  }

  if(s.type === "equationPredict"){
    choiceScreen(s, blocks(s.msg,true,true));
    return;
  }

  if(s.type === "equationReveal"){
    el("appPanel").innerHTML =
      base(s) +
      blocks(s.msg,true,true) +
      '<div class="equation">'+s.equation+'</div>' +
      '<div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Reflect</button></div>';
    return;
  }

  if(s.type === "reflection"){
    choiceScreen(s, '<p>Choose the statement that explains the idea.</p>');
    return;
  }

  if(s.type === "complete"){
    el("appPanel").innerHTML =
      '<div class="complete"><div class="check">✓</div>' +
      base(s) +
      '<p>'+s.body+'</p>' +
      '<div class="coach" style="display:block">Next concept: Difference.</div>' +
      '<button class="btn primary" onclick="restart()">Restart lesson</button></div>';
    return;
  }
}

function choiceScreen(s,visual){
  let html = base(s) + visual + '<div class="choiceGrid">';
  s.choices.forEach((c,i) => {
    html += '<button class="choice" data-i="'+i+'" onclick="pick(this)"><span>'+c[0]+'</span><span></span></button>';
  });
  html += '</div>' +
    '<div class="row"><button class="btn secondary" onclick="hint()">Hint</button><button class="btn primary" id="submit" onclick="submitChoice()" disabled>Check answer</button></div>' +
    '<div class="hint" id="hintBox"></div>' +
    '<div class="feedback" id="feedback"></div>';
  el("appPanel").innerHTML = html;
}

function pick(btn){
  selected = parseInt(btn.getAttribute("data-i"),10);
  document.querySelectorAll(".choice").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  el("submit").disabled = false;
  emit("select",{value:selected});
}

function submitChoice(){
  const s = screens[index];
  const good = s.choices[selected][1];
  const fb = el("feedback");
  const all = document.querySelectorAll(".choice");
  emit("submit",{correct:good,value:selected});

  if(good){
    all.forEach((b,i) => {
      b.disabled = true;
      if(s.choices[i][1]) b.classList.add("correct");
    });
    fb.style.display = "block";
    fb.className = "feedback success";
    fb.innerHTML = "<strong>Correct.</strong><br>" + s.choices[selected][2];
    setTimeout(next,900);
  }else{
    const h = s.hints ? s.hints[Math.min(hintIndex,s.hints.length-1)] : "Look carefully and try again.";
    hintIndex++;
    fb.style.display = "block";
    fb.className = "feedback warn";
    fb.innerHTML = "<strong>Look again.</strong><br>" + h;
    all.forEach(b => {
      b.disabled = false;
      b.classList.remove("selected","correct","incorrect");
      b.lastElementChild.innerHTML = "";
    });
    selected = null;
    el("submit").disabled = true;
    emit("guided_retry",{hint:h});
  }
}

function hint(){
  const s = screens[index];
  const h = s.hints ? s.hints[Math.min(hintIndex,s.hints.length-1)] : "Look carefully and try again.";
  hintIndex++;
  const box = el("hintBox");
  box.style.display = "block";
  box.innerHTML = "<strong>Hint</strong><br>" + h;
  emit("hint",{hint:h});
}

function next(){
  if(index < screens.length - 1){
    index++;
    render();
  }
}

function back(){
  if(index > 0){
    index--;
    render();
  }
}

function restart(){
  index = 0;
  events = [];
  render();
}

el("analyticsBtn").onclick = function(){
  alert(JSON.stringify(events,null,2));
};

el("themeBtn").onclick = function(){
  dark = !dark;
  document.body.setAttribute("data-theme", dark ? "dark" : "light");
  this.innerHTML = dark ? "Light mode" : "Dark mode";
};

el("textBtn").onclick = function(){
  big = !big;
  document.documentElement.style.setProperty("--scale", big ? "1.12" : "1");
  this.innerHTML = big ? "Normal text" : "Bigger text";
};

el("motionBtn").onclick = function(){
  reduce = !reduce;
  document.body.className = reduce ? "reduce" : "";
  this.innerHTML = reduce ? "Allow motion" : "Reduce motion";
};

render();
</script>
</body>
</html>
