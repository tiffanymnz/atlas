var screens=[{type:"intro",label:"Lesson 001",title:"How many more?",body:"One idea: comparison means finding the gap between two amounts."},{type:"observe",label:"Observe",title:"Which group has extra blocks?",msg:"Both rows start in the same place. Which row goes farther?"},{type:"discover",label:"Discover",title:"What do the glowing blocks show?",msg:"The extra blocks show how much farther the top row goes.",choices:[["The total",false,"Total means putting both groups together. This visual is comparing."],["The difference",true,"Correct. The glowing blocks show the difference, or the gap."],["The smaller group",false,"The smaller group is the green row. The glowing blocks are what is unmatched."]],hints:["Look at the two rows side by side.","Look for the blocks that do not have a match.","Only count the blocks that do not have a match."]},{type:"language",label:"Language",title:"Different words. Same gap.",msg:"These phrases all point to the same relationship.",phrases:["How many more?","Difference","Exceeds by","Compared with"]},{type:"equationPredict",label:"Symbol",title:"What equation measures the gap?",choices:[["15 - 9",true,"Yes. Start with the larger amount and subtract the smaller amount."],["15 + 9",false,"That combines the groups. Here we are comparing them."],["9 - 15",false,"That reverses the comparison. Start with the larger amount."]],hints:["The equation should measure what is extra.","Start with 15 because it is the larger group."]},{type:"equationReveal",label:"Reveal",title:"Subtraction measures the gap.",equation:"15 - 9 = 6",msg:"The equation confirms what the visual already showed."},{type:"reflection",label:"Reflect",title:"What did you discover?",choices:[["Subtraction always means taking away.",false],["Subtraction can measure the gap between two amounts.",true],["The word more always means add.",false]]},{type:"complete",label:"Complete",title:"You measured the gap.",body:"You connected the visual, the words, and the equation. That is un
