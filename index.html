var screens=[{type:"intro",label:"Lesson 001",title:"How many more?",body:"One idea: comparison means finding the gap between two amounts."},{type:"observe",label:"Observe",title:"Which group has extra blocks?",msg:"Both rows start in the same place. Which row goes farther?"},{type:"discover",label:"Discover",title:"What do the glowing blocks show?",msg:"The extra blocks show how much farther the top row goes.",choices:[["The total",false,"Total means putting both groups together. This visual is comparing."],["The difference",true,"Correct. The glowing blocks show the difference, or the gap."],["The smaller group",false,"The smaller group is the green row. The glowing blocks are what is unmatched."]],hints:["Look at the two rows side by side.","Look for the blocks that do not have a match.","Only count the blocks that do not have a match."]},{type:"language",label:"Language",title:"Different words. Same gap.",msg:"These phrases all point to the same relationship.",phrases:["How many more?","Difference","Exceeds by","Compared with"]},{type:"equationPredict",label:"Symbol",title:"What equation measures the gap?",choices:[["15 - 9",true,"Yes. Start with the larger amount and subtract the smaller amount."],["15 + 9",false,"That combines the groups. Here we are comparing them."],["9 - 15",false,"That reverses the comparison. Start with the larger amount."]],hints:["The equation should measure what is extra.","Start with 15 because it is the larger group."]},{type:"equationReveal",label:"Reveal",title:"Subtraction measures the gap.",equation:"15 - 9 = 6",msg:"The equation confirms what the visual already showed."},{type:"reflection",label:"Reflect",title:"What did you discover?",choices:[["Subtraction always means taking away.",false],["Subtraction can measure the gap between two amounts.",true],["The word more always means add.",false]]},{type:"complete",label:"Complete",title:"You measured the gap.",body:"You connected the visual, the words, and the equation. That is understanding."}];
var index=0,selected=null,hintIndex=0,events=[],dark=false,big=false,reduce=false;
function el(id){return document.getElementById(id)}
function emit(t,p){events.push({time:new Date().toISOString(),screen:index,component:screens[index].type,type:t,payload:p||{}})}
function pct(){return Math.round(index/(screens.length-1)*100)}
function base(s){return '<span class="badge">'+s.label+'</span><div class="progress"><span style="width:'+pct()+'%"></span></div><h1>'+s.title+'</h1>'}
function row(count,bottom,reveal){var h='<div class="blockRow">';for(var i=0;i<count;i++){var cls='block';if(bottom)cls+=' bottom';if(!bottom&&reveal&&i>=9)cls+=' extra';else if(reveal&&i<9)cls+=' dim';h+='<span class="'+cls+'" style="animation-delay:'+(i*20)+'ms"></span>'}return h+'</div>'}

function render(){var s=screens[index];selected=null;hintIndex=0;emit("mount",{});if(s.type==="intro"){el("appPanel").innerHTML=base(s)+'<p>'+s.body+'</p><div class="coach" style="display:block">Atlas teaches meaning before procedure.</div><div class="row"><button class="btn primary" onclick="next()">Start lesson</button></div>';return}if(s.type==="observe"){el("appPanel").innerHTML=base(s)+blocks(s.msg,false,false)+'<div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Reveal the gap</button></div>';return}if(s.type==="discover"){choiceScreen(s,blocks(s.msg,true,false));return}if(s.type==="language"){var ph='';for(var i=0;i<s.phrases.length;i++)ph+='<div class="phrase">'+s.phrases[i]+'<span>Find the gap</span></div>';el("appPanel").innerHTML=base(s)+blocks(s.msg,true,false)+'<div class="phraseGrid">'+ph+'</div><div class="coach" style="display:block">Some words can be tricky. First ask: are we putting groups together, or comparing them?</div><div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Next</button></div>';return}if(s.type==="equationPredict"){choiceScreen(s,blocks("The top row goes farther. Which equation measures that gap?",true,true));return}if(s.type==="equationReveal"){el("appPanel").innerHTML=base(s)+blocks(s.msg,true,true)+'<div class="equation">'+s.equation+'</div><div class="row"><button class="btn secondary" onclick="back()">Back</button><button class="btn primary" onclick="next()">Reflect</button></div>';return}if(s.type==="reflection"){choiceScreen(s,'<p>Choose the statement that explains the idea.</p>');return}if(s.type==="complete"){el("appPanel").innerHTML='<div class="complete"><div class="check">✓</div>'+base(s)+'<p>'+s.body+'</p><div class="coach" style="display:block">Next concept: Difference.</div><button class="btn primary" onclick="restart()">Restart lesson</button></div>';return}}
function choiceScreen(s,visual){var html=base(s)+visual+'<div class="choiceGrid">';for(var i=0;i<s.choices.length;i++)html+='<button class="choice" data-i="'+i+'" onclick="pick(this)"><span>'+s.choices[i][0]+'</span><span></span></button>';html+='</div><div class="row"><button class="btn secondary" onclick="hint()">Hint</button><button class="btn primary" id="submit" onclick="submitChoice()" disabled>Check answer</button></div><div class="hint" id="hintBox"></div><div class="feedback" id="feedback"></div>';el("appPanel").innerHTML=html}
function pick(btn){selected=parseInt(btn.getAttribute("data-i"),10);var all=document.querySelectorAll(".choice");for(var i=0;i<all.length;i++)all[i].classList.remove("selected");btn.classList.add("selected");el("submit").disabled=false;emit("select",{value:selected})}
function enableRetry(msg){var all=document.querySelectorAll(".choice");for(var i=0;i<all.length;i++){all[i].disabled=false;all[i].classList.remove("selected","correct","incorrect");all[i].lastChild.innerHTML=""}selected=null;el("submit").disabled=true;var fb=el("feedback");fb.style.display="block";fb.className="feedback warn";fb.innerHTML="<strong>Try again.</strong><br>"+msg}
function submitChoice(){var s=screens[index],good=s.choices[selected][1],explain=s.choices[selected][2]||"",fb=el("feedback"),all=document.querySelectorAll(".choice");emit("submit",{correct:good,value:selected});if(good){for(var i=0;i<all.length;i++){all[i].disabled=true;if(s.choices[i][1])all[i].classList.add("correct")}fb.style.display="block";fb.className="feedback success";fb.innerHTML="<strong>Correct.</strong>"+(explain?"<br>"+explain:"");setTimeout(next,900)}else{var h=s.hints?s.hints[Math.min(hintIndex,s.hints.length-1)]:"Look at what the problem is asking you to find.";hintIndex++;fb.style.display="block";fb.className="feedback warn";fb.innerHTML="<strong>Look again.</strong><br>"+h;for(var j=0;j<all.length;j++){all[j].disabled=false;all[j].classList.remove("selected","correct","incorrect");all[j].lastChild.innerHTML=""}selected=null;el("submit").disabled=true;emit("guided_retry",{hint:h})}}function hint(){var s=screens[index],box=el("hintBox"),h=s.hints?s.hints[Math.min(hintIndex,s.hints.length-1)]:"Look at what the problem is asking you to find.";box.style.display="block";box.innerHTML="<strong>Hint</strong><br>"+h;emit("hint",{hintIndex:hintIndex,hint:h});hintIndex++}
function next(){if(index<screens.length-1){index++;render()}}
function back(){if(index>0){index--;render()}}
function restart(){index=0;events=[];render()}
function showAnalytics(){var attempts=events.filter(function(e){return e.type==="submit"});var hints=events.filter(function(e){return e.type==="hint"||e.type==="guided_retry"}).length;var wrong=attempts.filter(function(e){return e.payload&&e.payload.correct===false}).length;var correct=attempts.filter(function(e){return e.payload&&e.payload.correct===true}).length;var screensSeen={};events.forEach(function(e){screensSeen[e.screen]=true});var seen=Object.keys(screensSeen).length;var progress=pct();var identifiedGap=events.some(function(e){return e.component==="discover"&&e.type==="submit"&&e.payload&&e.payload.correct===true});var equationCorrect=events.some(function(e){return e.component==="equationPredict"&&e.type==="submit"&&e.payload&&e.payload.correct===true});var reflected=events.some(function(e){return e.component==="reflection"&&e.type==="submit"&&e.payload&&e.payload.correct===true});var firstTryAccuracy=attempts.length?Math.round((correct/attempts.length)*100):0;el("analyticsSummary").innerHTML='<div class="analyticsMetric"><strong>'+progress+'%</strong><span>Progress</span></div><div class="analyticsMetric"><strong>'+correct+'</strong><span>Correct answers</span></div><div class="analyticsMetric"><strong>'+wrong+'</strong><span>Retries</span></div><div class="analyticsMetric"><strong>'+hints+'</strong><span>Hints used</span></div><div class="analyticsMetric"><strong>'+firstTryAccuracy+'%</strong><span>Accuracy so far</span></div><div class="analyticsMetric"><strong>'+seen+'</strong><span>Screens visited</span></div>';var lines=[];lines.push("Lesson Summary");lines.push("");lines.push("You learned:");lines.push(identifiedGap?"✓ The gap is the part that does not match.":"○ Identify the gap between two rows.");lines.push(equationCorrect?"✓ Subtraction can measure the gap.":"○ Choose the equation that measures the gap.");lines.push(reflected?"✓ You explained the idea in reflection.":"○ Finish the reflection to check understanding.");lines.push("");if(wrong===0&&attempts.length>0){lines.push("Strength: You are moving through the lesson without retries.");}else if(wrong>0){lines.push("Next focus: Slow down before choosing. Ask: are we combining groups or comparing them?");}else{lines.push("Start the lesson to build your summary.");}if(hints>0){lines.push("Support used: Hints helped you keep going.");}el("analyticsDetails").textContent=lines.join("\\n");el("analyticsModal").style.display="flex"}el("analyticsBtn").onclick=showAnalytics;el("closeAnalytics").onclick=function(){el("analyticsModal").style.display="none"};el("analyticsModal").onclick=function(e){if(e.target.id==="analyticsModal")el("analyticsModal").style.display="none"};
el("themeBtn").onclick=function(){dark=!dark;document.body.setAttribute("data-theme",dark?"dark":"light");this.innerHTML=dark?"Light mode":"Dark mode"};

render();
